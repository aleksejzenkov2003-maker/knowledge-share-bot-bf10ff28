<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Ассистент - Чат отдела</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
    }
    #knowledge-chat {
      height: 100vh;
      width: 100%;
    }
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #666;
    }
    .loading svg {
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 20px;
      text-align: center;
    }
    .error-icon {
      width: 48px;
      height: 48px;
      color: #dc2626;
      margin-bottom: 16px;
    }
    .error h2 {
      color: #333;
      margin-bottom: 8px;
    }
    .error p {
      color: #666;
      max-width: 400px;
    }
    .retry-btn {
      margin-top: 16px;
      padding: 10px 24px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .retry-btn:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <div id="knowledge-chat">
    <div class="loading" id="loading">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12a9 9 0 11-6.219-8.56"/>
      </svg>
      <span>Загрузка группового AI Ассистента...</span>
    </div>
  </div>

  <div id="error-container" style="display: none;">
    <div class="error">
      <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <h2>Ошибка инициализации</h2>
      <p id="error-message">Не удалось загрузить приложение</p>
      <button class="retry-btn" onclick="location.reload()">Попробовать снова</button>
    </div>
  </div>

  <!-- Bitrix24 JS SDK -->
  <script src="//api.bitrix24.com/api/v1/"></script>
  
  <!-- Knowledge Chat Widget SDK v3 -->
  <script src="https://admin.artpatent-content.ru/widget/bitrix-chat-widget-v3.js"></script>
  
  <script>
    (function() {
      'use strict';

      function showError(message) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('knowledge-chat').style.display = 'none';
        document.getElementById('error-container').style.display = 'block';
        document.getElementById('error-message').textContent = message;
      }

      function initChat() {
        // Check if BX24 SDK is available
        if (typeof BX24 === 'undefined') {
          showError('Bitrix24 SDK не найден. Откройте приложение из Bitrix24.');
          return;
        }

        // Initialize Bitrix24 SDK
        BX24.init(function() {
          try {
            // Get portal domain using multiple methods with fallback
            var portal = null;

            console.log('[AI Assistant Department] Определение домена портала...');

            // Метод 1: BX24.getDomain() - основной для локальных приложений
            if (typeof BX24.getDomain === 'function') {
              portal = BX24.getDomain();
              console.log('[AI Assistant Department] BX24.getDomain():', portal);
            }

            // Метод 2: placement.info().DOMAIN - для placement-приложений
            if (!portal) {
              try {
                var placement = BX24.placement.info();
                portal = placement.DOMAIN || placement.domain;
                console.log('[AI Assistant Department] placement.info():', portal);
              } catch (e) {
                console.log('[AI Assistant Department] placement.info() не доступен');
              }
            }

            // Метод 3: Парсинг referrer
            if (!portal && document.referrer) {
              try {
                var url = new URL(document.referrer);
                if (url.hostname.includes('bitrix24')) {
                  portal = url.hostname;
                  console.log('[AI Assistant Department] referrer:', portal);
                }
              } catch (e) {}
            }

            console.log('[AI Assistant Department] Итоговый portal:', portal);

            if (!portal) {
              showError('Не удалось определить домен портала Bitrix24. Попробуйте перезагрузить страницу.');
              return;
            }

            // Get current user info
            BX24.callMethod('user.current', {}, function(result) {
              if (result.error()) {
                showError('Ошибка получения данных пользователя: ' + result.error());
                return;
              }

              var user = result.data();
              
              // Initialize Knowledge Chat widget - DEPARTMENT mode
              try {
                KnowledgeChat.init({
                  containerId: 'knowledge-chat',
                  portal: portal,
                  bitrixUserId: user.ID,
                  userName: [user.NAME, user.LAST_NAME].filter(Boolean).join(' '),
                  userEmail: user.EMAIL || '',
                  chatType: 'department', // Department chat mode
                  theme: 'light'
                });

                console.log('[AI Assistant Department] Initialized for user:', user.ID, 'on portal:', portal);
              } catch (e) {
                showError('Ошибка инициализации чата: ' + e.message);
              }
            });
          } catch (e) {
            showError('Ошибка: ' + e.message);
          }
        });
      }

      // Start initialization when DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initChat);
      } else {
        initChat();
      }
    })();
  </script>
</body>
</html>
